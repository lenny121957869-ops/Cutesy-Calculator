<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cutesy Calculator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="calculator">
    <h1>Cutesy Calculator</h1>
    <input type="text" id="display" readonly placeholder="0" />
    <div class="buttons">
      <button class="button-image-7"data-value="7">7</button>
      <button class="button-image-8" data-value="8">8</button>
      <button class="button-image-9" data-value="9">9</button>
      <button data-value="/">÷</button>
      <button class="button-image-4"data-value="4">4</button>
      <button class="button-image-5"data-value="5">5</button>
      <button class="button-image-6" data-value="6">6</button>
      <button data-value="*">×</button>
      <button class="button-image-one" data-value="1">1</button>
      <button class="button-image-two" data-value="2">2</button>
      <button class="button-image-3" data-value="3">3</button>
      <button data-value="-">−</button>
      <button data-value="0">0</button>
      <button data-value=".">.</button>
      <button id="equals">=</button>
      <button data-value="+">+</button>
      <button id="clear">clear</button>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
